name: Flutter CI

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: ⬇️ Checkout código
    uses: actions/checkout@v4

  - name: 🛠️ Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.22.0'

  - name: 📦 Instalar dependencias
    run: flutter pub get

  # 🔥 FIX IMPORTANTE: analizamos solo donde no rompe (evita web issues)
  - name: 🔍 Analyze (sin web)
    run: dart analyze --exclude=lib/**/_web.dart

  # (opcional pero recomendado)
  - name: 🧪 Tests
    run: flutter test

  # (opcional) build APK para validar que compile
  - name: 📱 Build APK
    run: flutter build apk --debug
```
