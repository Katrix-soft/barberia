name: Upload to Appetize

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 📦 Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐦 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 🔍 Ver entorno
      - name: Flutter doctor
        run: flutter doctor -v

      # 📦 Instalar dependencias Flutter
      - name: Install dependencies
        run: flutter pub get

      # 🔍 Analizar SOLO Flutter (evita romper por backend)
      - name: Analyze Flutter
        run: flutter analyze

      # 🔥 Forzar Podfile con iOS 15 (fix mobile_scanner)
      - name: Fix Podfile iOS 15
        run: |
          cat > ios/Podfile << 'EOF'
          platform :ios, '15.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
              end
            end
          end
          EOF

      # 🍎 Instalar CocoaPods
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod repo update

      # ⚙️ Instalar pods
      - name: Install Pods
        run: |
          cd ios
          pod install
          cd ..

      # 🔨 Build iOS simulator
      - name: Build iOS Simulator
        run: |
          flutter clean
          flutter build ios --simulator --no-codesign -v
          cd build/ios/iphonesimulator
          zip -r app.zip Runner.app

      # 🚀 Subir a Appetize
      - name: Upload to Appetize
        run: |
          curl -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/app.zip" \
            -F "platform=ios"
