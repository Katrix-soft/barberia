name: Upload to Appetize

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 📦 Repo
      - name: Checkout
        uses: actions/checkout@v4

      # 🐦 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Dependencias Flutter
      - name: Pub get
        run: flutter pub get

      # 🔥 IMPORTANTE: generar archivos iOS base
      - name: Precache iOS
        run: flutter precache --ios

      # 🔥 LIMPIAR TODO
      - name: Clean build
        run: |
          flutter clean
          flutter pub get

      # 🔥 Fix Podfile (iOS 16 para mobile_scanner)
      - name: Fix Podfile
        run: |
          cat > ios/Podfile << 'EOF'
          platform :ios, '16.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), Dir.pwd)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
              end
            end
          end
          EOF

      # 🍎 CocoaPods limpio
      - name: Install Pods clean
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      # 🔨 BUILD (esto ahora sí funciona)
      - name: Build iOS
        run: flutter build ios --simulator --no-codesign

      # 📦 ZIP
      - name: Zip app
        run: |
          cd build/ios/iphonesimulator
          zip -r app.zip Runner.app

      # 🚀 Upload
      - name: Upload to Appetize
        run: |
          curl -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/app.zip" \
            -F "platform=ios"
