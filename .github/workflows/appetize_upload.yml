name: Upload to Appetize

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 📦 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐦 Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 🔍 Debug
      - name: Flutter doctor
        run: flutter doctor -v

      # 🧹 CLEAN PRIMERO (CLAVE)
      - name: Flutter clean
        run: flutter clean

      # 📦 Dependencias (esto genera Generated.xcconfig)
      - name: Install dependencies
        run: flutter pub get

      # 🔥 Fix Podfile (iOS 13)
      - name: Fix Podfile
        run: |
          cat > ios/Podfile << 'EOF'
          platform :ios, '13.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. Run flutter pub get first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks! :linkage => :static
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          EOF

      # 🍎 CocoaPods
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod repo update

      # 🧹 Limpiar SOLO pods (NO flutter clean otra vez)
      - name: Clean iOS build
        run: |
          rm -rf ios/Pods ios/Podfile.lock

      # ⚙️ Instalar Pods
      - name: Install Pods
        run: |
          cd ios
          pod install
          cd ..

      # 🔨 Build iOS Simulator
      - name: Build iOS Simulator
        run: flutter build ios --simulator --no-codesign

      # 📦 Zip app
      - name: Zip app
        run: |
          cd build/ios/iphonesimulator
          zip -r app.zip Runner.app

      # 🚀 Upload a Appetize
      - name: Upload to Appetize
        run: |
          curl -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/app.zip" \
            -F "platform=ios"
