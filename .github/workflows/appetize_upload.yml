name: Upload to Appetize

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Setup iOS
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS Simulator
        run: |
          flutter build ios --simulator --no-codesign -v
          cd build/ios/iphonesimulator
          zip -r app.zip Runner.app

      - name: Upload to Appetize
        run: |
          curl -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/app.zip" \
            -F "platform=ios"
          curl -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/app.zip" \
            -F "platform=ios"
