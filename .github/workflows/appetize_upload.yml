name: Upload to Appetize

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 📦 Clonar repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐦 Instalar Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 🔍 Debug entorno
      - name: Flutter doctor
        run: flutter doctor -v

      # 📦 Dependencias
      - name: Install dependencies
        run: flutter pub get

      # 🔧 Fix iOS deployment target (para mobile_scanner)
      - name: Fix iOS deployment target
        run: |
          sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/' ios/Podfile || echo "platform already set"
      
      # 🍎 Instalar CocoaPods
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod repo update

      # ⚙️ Instalar pods
      - name: Setup iOS
        run: |
          cd ios
          pod install
          cd ..

      # 🔨 Build iOS (con logs completos)
      - name: Build iOS Simulator
        run: |
          flutter clean
          flutter build ios --simulator --no-codesign -v
          cd build/ios/iphonesimulator
          zip -r app.zip Runner.app

      # 🚀 Subir a Appetize
      - name: Upload to Appetize
        run: |
          curl -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/app.zip" \
            -F "platform=ios"
