name: Upload to Appetize

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 📦 Repo
      - uses: actions/checkout@v4

      # 🐦 Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Dependencias
      - run: flutter pub get

      # 🔥 Generar configs iOS correctamente
      - run: flutter precache --ios

      # 🔥 Clean total
      - run: |
          flutter clean
          flutter pub get

      # 🔥 Podfile CORRECTO (con FLUTTER_ROOT)
      - name: Fix Podfile
        run: |
          cat > ios/Podfile << 'EOF'
          platform :ios, '16.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. Run flutter pub get first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            use_frameworks!
            use_modular_headers!

            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '16.0'
              end
            end
          end
          EOF

      # 🍎 Pods limpios
      - name: Install Pods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      # 🔨 Build real
      - name: Build iOS
        run: flutter build ios --simulator --no-codesign

      # 📦 Zip
      - name: Zip app
        run: |
          cd build/ios/iphonesimulator
          zip -r app.zip Runner.app

      # 🚀 Upload
      - name: Upload to Appetize
        run: |
          curl -X POST https://api.appetize.io/v1/apps \
            -H "X-API-KEY: ${{ secrets.APPETIZE_API_TOKEN }}" \
            -F "file=@build/ios/iphonesimulator/app.zip" \
            -F "platform=ios"
