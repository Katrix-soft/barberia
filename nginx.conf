server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    # Gzip para rapidez
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types 
        text/plain 
        text/css 
        text/javascript 
        application/javascript 
        application/x-javascript 
        application/json 
        image/svg+xml;

    # Cache estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    # SPA fix
    location / {
        try_files $uri $uri/ /index.html;
    }
}


