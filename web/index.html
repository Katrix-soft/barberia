<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Posbarber LUXURY - Terminal de ventas premium.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Posbarber">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Posbarber LUXURY</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0A0A0A;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid #1A1A1A;
      border-top: 4px solid #C5A028;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      margin-top: 24px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #C5A028;
      font-size: 14px;
      letter-spacing: 4px;
      font-weight: bold;
      text-transform: uppercase;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading" class="loading-container">
    <div class="loader"></div>
    <div class="loader-text">PROCESANDO ACCESO LUXURY</div>
  </div>

  <!-- This is the classic, most compatible way to load Flutter -->
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function (ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null, // Avoid cache issues for now
        },
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        }
      });
    });

    // PWA & Splash Removal
    const observer = new MutationObserver(() => {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        const loader = document.getElementById('loading');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => loader.remove(), 500);
        }
        observer.disconnect();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>

</html>
