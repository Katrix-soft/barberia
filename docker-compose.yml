
services:
  posbarber_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: posbarber_web
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - npm_network
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - API_URL=

  barber_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barber_backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    networks:
      - npm_network
    environment:
      - TZ=America/Argentina/Buenos_Aires
      - PORT=8090
      - DB_PATH=/data/pos_barber.db
      - MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}
      - MP_USER_ID=${MP_USER_ID}
      - MP_EXTERNAL_POS_ID=${MP_EXTERNAL_POS_ID}
    volumes:
      - /opt/posbarber/data:/data:rw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  npm_network:
    external: true