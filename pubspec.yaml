name: posbarber
description: "A new Flutter project."
publish_to: 'none'
version: 1.4.47+45

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  
  # State Management & Architecture
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^8.0.3
  dartz: ^0.10.1
  
  # Charts & Visualización
  fl_chart: ^1.1.1
  
  # Utils
  path: ^1.9.0
  intl: ^0.20.2
  responsive_builder: ^0.7.1
  crypto: ^3.0.3
  
  # Network
  http: ^1.6.0
  url_launcher: ^6.3.2
  
  # Database - Multiplataforma
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  sqflite_common_ffi_web: ^0.4.0+1
  
  # Storage - Multiplataforma
  shared_preferences: ^2.5.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  
  # Audio - Multiplataforma
  audioplayers: ^6.6.0
  
  # Excel
  excel: ^4.0.6
  
  # QR Scanner - Solo mobile (condicional en código)
  mobile_scanner: ^7.2.0
  
  # Auth biométrica - Mobile + Desktop
  local_auth: ^2.3.0
  local_auth_android: ^1.0.47
  local_auth_darwin: ^1.4.1
  local_auth_windows: ^1.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  web:
    generate: true
    image_path: "assets/images/logobarber.jpg"
  image_path: "assets/images/logobarber.jpg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/audio/
