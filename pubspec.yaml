name: posbarber
description: "A new Flutter project."
publish_to: 'none'
version: 1.4.13+11

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  sqflite_common_ffi_web: ^0.4.0+1
  path: ^1.9.0
  dartz: ^0.10.1
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^8.0.3
  mobile_scanner: 3.5.2
  fl_chart: ^1.1.1
  excel: ^4.0.6
  intl: ^0.20.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.2
  responsive_builder: ^0.7.1
  path_provider: ^2.1.5
  font_awesome_flutter: ^10.7.0
  local_auth: ^2.3.0
  local_auth_windows: ^1.0.11
  url_launcher: ^6.3.2
  audioplayers: ^6.6.0
  http: ^1.6.0
  mailer: ^7.1.0
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  web:
    generate: true
    image_path: "assets/images/logobarber.jpg"
  image_path: "assets/images/logobarber.jpg"
  min_sdk_android: 21 

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
    - assets/audio/
